name: Link Checker

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9:00 AM UTC
  workflow_dispatch:       # Allow manual runs from the Actions tab

jobs:
  check-links:
    name: Check external links
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          # Check all TSX/TS source files for external URLs.
          # Exclude Wayback Machine URLs (archive links are expected to be slow/rate-limited)
          # and localhost references.
          args: >
            --verbose
            --no-progress
            --timeout 30
            --max-retries 3
            --retry-wait-time 5
            --exclude 'web\.archive\.org'
            --exclude 'localhost'
            --exclude 'example\.com'
            --exclude 'supabase\.co'
            './app/**/*.tsx'
            './app/**/*.ts'
            './lib/**/*.ts'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Broken links detected — ${new Date().toISOString().split('T')[0]}`;
            const body = [
              '## Broken links detected',
              '',
              'The weekly link checker found one or more broken or unreachable external links in the codebase.',
              '',
              `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Check the workflow logs above for the full list of failing URLs.',
              '',
              'Common causes:',
              '- A platform changed or removed a help page',
              '- A news article URL is no longer live (check if an archived copy exists)',
              '- A temporary outage (re-run the workflow to confirm)',
            ].join('\n');

            // Avoid duplicate issues: check if one is already open with the same title prefix
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'broken-links',
            });

            const alreadyOpen = issues.some(i => i.title.startsWith('Broken links detected'));
            if (!alreadyOpen) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['broken-links'],
              });
            }
